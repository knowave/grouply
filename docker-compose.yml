services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grouply-backend
    environment:
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:1212
    ports:
      - "9090:8080"
    networks:
      - grouply-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9090
    container_name: grouply-frontend
    depends_on:
      - backend
    ports:
      - "1212:5173"
    networks:
      - grouply-network

networks:
  grouply-network:
    driver: bridge
